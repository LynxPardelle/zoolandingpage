@if (routableInternalHref()) {
<a
  [id]="id()"
  [href]="href()"
  [routerLink]="routerLinkPath()"
  [queryParams]="routerLinkQueryParams()"
  [fragment]="routerLinkFragment()"
  [class]="classes()"
  [attr.target]="target()"
  [rel]="rel()"
  [attr.aria-label]="ariaLabel()"
  [attr.aria-expanded]="ariaExpanded()"
  [attr.aria-controls]="ariaControls()"
  [attr.aria-current]="ariaCurrent()"
  [attr.data-components]="componentTokensAttribute()"
  (click)="onClick($event)"
  >@if( text() ){
  {{ text() }}
  }
  <ng-content></ng-content>
</a>
} @else {
<a
  [id]="id()"
  [href]="href()"
  [class]="classes()"
  [attr.target]="target()"
  [rel]="rel()"
  [attr.aria-label]="ariaLabel()"
  [attr.aria-expanded]="ariaExpanded()"
  [attr.aria-controls]="ariaControls()"
  [attr.aria-current]="ariaCurrent()"
  [attr.data-components]="componentTokensAttribute()"
  (click)="onClick($event)"
  >@if( text() ){
  {{ text() }}
  }
  <ng-content></ng-content>
</a>
}
