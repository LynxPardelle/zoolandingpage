<div class="{{ config?.accordionContainerClasses || '' }}" role="group">
  @for (item of items(); track item.id; let idx = $index) {
  <div
    class="{{ item.accordionItemContainerClasses || config?.accordionDefaultItemContainerClasses || '' }} {{
      isExpanded(item.id)
        ? item.accordionItemContainerIsExpandedClasses || config?.accordionDefaultItemContainerIsExpandedClasses || ''
        : item.accordionItemContainerIsNotExpandedClasses ||
          config?.accordionDefaultItemContainerIsNotExpandedClasses ||
          ''
    }}"
  >
    <generic-button
      [config]="{
        id: buttonId(item.id),
        ariaExpanded: isExpanded(item.id),
        ariaControls: panelId(item.id),
        label: item.title,
        disabled: item.disabled,
        classes:
          (item.accordionItemButtonClasses || config?.accordionDefaultItemButtonClasses || '') +
          (isExpanded(item.id)
            ? ' ' +
              (item.accordionItemButtonIsExpandedClasses || config?.accordionDefaultItemButtonIsExpandedClasses || '')
            : ' ' +
              (item.accordionItemButtonIsNotExpandedClasses ||
                config?.accordionDefaultItemButtonIsNotExpandedClasses ||
                '')),
        icon: 'arrow_drop_down',
        iconClasses:
          'ank-transition-transform ank-transformOrigin-center ank-fontSize-1_25rem ank-color-accentColor' +
          (isExpanded(item.id) ? ' ank-transform-rotate-180deg' : '')
      }"
      (pressed)="toggle(item.id)"
      (keydown)="onKey($event, idx)"
    />
    @if (isExpanded(item.id)) {
    <div
      class="{{ item.accordionItemPanelClasses || config?.accordionDefaultItemPanelClasses || '' }}"
      [attr.id]="panelId(item.id)"
      role="region"
      [attr.aria-labelledby]="buttonId(item.id)"
    >
      <p class="ank-marginBlockStart-0 ank-marginBlockEnd-0 ank-color-textColor">
        {{ item.content }}
      </p>
    </div>
    }
  </div>
  }
</div>
