<div [class]="classes()">
  <generic-button
    [config]="{
      type: 'button',
      role: triggerRole(),
      ariaLabel: ariaLabel(),
      ariaExpanded: opened(),
      ariaHaspopup: true,
      ariaControls: opened() ? menuId() : undefined,
      ariaActiveDescendant: opened() && activeIndex() > -1 ? 'dd-opt-' + activeIndex() : undefined,
      classes: buttonClasses()
    }"
    (pressed)="toggle()"
  >
    <ng-content select="[trigger]"></ng-content>
  </generic-button>
  <ng-template #defaultMenuTpl let-items="items" let-select="select">
    <nav [class]="menuNavClasses()" [attr.aria-label]="ariaLabel() || null">
      <ul [id]="menuId()" [attr.role]="menuRole()" [class]="'dropdown-menu-list ' + menuListClasses()">
        @for (it of items; track it.id; let idx = $index) {
        <li role="none" class="dropdown-menu-item">
          <a
            [attr.id]="'dd-opt-' + idx"
            [attr.role]="itemRole()"
            [attr.aria-disabled]="itemDisabled(it) ? 'true' : null"
            [attr.aria-selected]="menuRole() === 'listbox' ? (isSelectedItem(it) ? 'true' : 'false') : null"
            [attr.aria-label]="itemAriaLabel(it) || null"
            [attr.href]="itemHref(it)"
            [class]="itemClasses(it)"
            tabindex="-1"
            (click)="$event.preventDefault(); !itemDisabled(it) && select(it)"
          >
            {{ itemLabel(it) }}
          </a>
        </li>
        }
      </ul>
    </nav>
  </ng-template>
</div>
