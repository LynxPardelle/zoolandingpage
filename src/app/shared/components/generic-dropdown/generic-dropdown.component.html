<div [class]="classes()">
  <generic-button
    [config]="{
      type: 'button',
      ariaExpanded: opened(),
      ariaHaspopup: true,
      ariaControls: opened() ? 'dd-menu' : undefined,
      ariaActiveDescendant: opened() && activeIndex() > -1 ? 'dd-opt-' + activeIndex() : undefined,
      classes: buttonClasses()
    }"
    (pressed)="toggle()"
  >
    <ng-content select="[trigger]"></ng-content>
  </generic-button>
  <ng-template #defaultMenuTpl let-items="items" let-select="select">
    <ul id="dd-menu" role="menu">
      @for (it of items; track it.id; let idx = $index) {
      <li role="none">
        <generic-button
          [config]="{
            label: it.label,
            disabled: it.disabled,
            tabIndex: -1,
            role: 'menuitem',
            id: 'dd-opt-' + idx,
            classes: ''
          }"
          (pressed)="select(it)"
        />
      </li>
      }
    </ul>
  </ng-template>
</div>
