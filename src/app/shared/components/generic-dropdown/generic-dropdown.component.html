<div [class]="classes()">
  <generic-button
    [config]="{
      type: 'button',
      ariaExpanded: opened(),
      ariaHaspopup: true,
      ariaControls: opened() ? 'dd-menu' : undefined,
      ariaActiveDescendant: opened() && activeIndex() > -1 ? 'dd-opt-' + activeIndex() : undefined,
      classes: buttonClasses()
    }"
    (pressed)="toggle()"
  >
    <ng-content select="[trigger]"></ng-content>
  </generic-button>
  <ng-template #defaultMenuTpl let-items="items" let-select="select">
    <nav [class]="menuNavClasses()">
      <ul id="dd-menu" role="menu" [class]="menuListClasses()">
        @for (it of items; track it.id; let idx = $index) {
        <li role="none">
          <a
            [attr.id]="'dd-opt-' + idx"
            role="menuitem"
            [attr.aria-disabled]="it.disabled ? 'true' : null"
            [attr.href]="itemHref(it)"
            [class]="itemLinkClasses()"
            tabindex="-1"
            (click)="$event.preventDefault(); !it.disabled && select(it)"
          >
            {{ itemLabel(it) }}
          </a>
        </li>
        }
      </ul>
    </nav>
  </ng-template>
</div>
