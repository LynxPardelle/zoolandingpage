<iframe
  [attr.id]="id()"
  [src]="src()"
  [attr.title]="title()"
  [attr.loading]="loading()"
  [attr.allow]="allow()"
  [attr.referrerpolicy]="referrerPolicy()"
  [attr.sandbox]="sandbox()"
  [attr.allowfullscreen]="allowFullscreen() ? '' : null"
  [attr.height]="height()"
  [class]="classes()"
></iframe>
