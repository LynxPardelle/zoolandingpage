@switch (tag()) { @case ('audio') {
<audio [id]="id()" [class]="classes()" [src]="src()" controls></audio>
} @case ('video') {
<video [id]="id()" [class]="classes()" [src]="src()" controls></video>
} @case ('image') {
<img [id]="id()" [class]="classes()" [src]="src()" [attr.alt]="alt()" />
} @case ('document') {
<a [id]="id()" [class]="classes()" [href]="src()" target="_blank" rel="noopener noreferrer">
  {{ linkLabel() }}
</a>
} @default {
<a [id]="id()" [class]="classes()" [href]="src()" target="_blank" rel="noopener noreferrer">
  {{ linkLabel() }}
</a>
} }
