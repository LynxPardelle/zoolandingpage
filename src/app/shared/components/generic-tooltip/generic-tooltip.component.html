<ng-template #tooltipTpl>
  <div
    [class]="surfaceClasses()"
    [id]="id()"
    role="tooltip"
    [attr.aria-live]="ariaLive()"
    [attr.aria-hidden]="!visible()"
    [attr.inert]="!visible() ? '' : null"
  >
    @if (richTemplate) {
    <ng-container [ngTemplateOutlet]="richTemplate"></ng-container>
    } @else {
    {{ content() }}
    } @if (arrow) {
    <span [class]="arrowClasses()" aria-hidden="true"></span>
    }
  </div>
</ng-template>
