@if (isBrandIcon()) {
<svg
  [attr.title]="title()"
  [class]="classes()"
  [attr.aria-label]="ariaLabel()"
  [attr.aria-hidden]="ariaHidden()"
  viewBox="0 0 24 24"
  focusable="false"
>
  <path [attr.d]="brandPath()" fill="currentColor"></path>
</svg>
} @else {
<mat-icon [title]="title()" [class]="classes()" [attr.aria-label]="ariaLabel()" [attr.aria-hidden]="ariaHidden()">{{
  iconName()
}}</mat-icon>
}
