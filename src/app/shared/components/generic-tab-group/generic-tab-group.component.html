<div class="tab-group ank-display-flex ank-gap-0_25rem" role="tablist" aria-orientation="horizontal">
  @for (t of tabs(); track t.id; let idx = $index) {
  <generic-button
    [config]="{
      label: t.label,
      classes:
        'ank-bg-transparent ank-border-none ank-px-0_75rem ank-py-0_5rem ank-borderRadius-0_5rem ank-cursor-pointer' +
        (isActive(t.id) ? ' ank-bg-secondaryBgColor ank-fontWeight-600' : ''),
      role: 'tab',
      disabled: t.disabled,
      id: 'tab-' + t.id,
      ariaSelected: isActive(t.id),
      ariaControls: 'panel-' + t.id,
      tabIndex: isActive(t.id) ? 0 : -1
    }"
    (pressed)="select(t.id)"
  >
  </generic-button>
  }
</div>
<div class="tab-panels">
  @for (t of tabs(); track t.id) { @if (isActive(t.id)) {
  <div
    class="tab-panel tab-panel-anim ank-mt-0_75rem"
    role="tabpanel"
    [attr.id]="'panel-' + t.id"
    [attr.aria-labelledby]="'tab-' + t.id"
  >
    @defer (when isActive(t.id)) {
    <ng-content select="[tab-content-{{ t.id }}]"></ng-content>
    } @placeholder {
    <div class="ank-fontSize-0_875rem ank-color-textSecondary">{{ i18n.t("ui.common.loadingPanel") }}</div>
    }
  </div>
  } }
</div>
