<wrapper-orchestrator
  [componentsIds]="['skipToMainLink', 'siteHeader', 'landingPage', 'siteFooter']"
></wrapper-orchestrator>
<!-- Toast host analytics forwarding -->
<generic-toast-host (analyticsEvent)="handleAnalyticsEvent($event)"></generic-toast-host>

<!-- Advanced component hosts -->
<generic-modal-host [config]="(orchestrator.modalHostConfig$ | async) ?? orchestrator.fallbackModalHostConfig">
  <wrapper-orchestrator
    [componentsIds]="['modalAnalyticsConsentRoot', 'modalDemoRoot', 'modalTermsRoot', 'modalDataUseRoot']"
  ></wrapper-orchestrator>
</generic-modal-host>
<generic-toast-host></generic-toast-host>

<!-- Dev-only demo controls -->
@if (debugMode) {
<wrapper-orchestrator [componentsIds]="orchestrator.devDemoControlsComponents"></wrapper-orchestrator>
} @if (debugMode) {
<div
  class="ank-position-md-fixed ank-bottom-6rem ank-right-25vw ank-mx-auto ank-p-0_5rem ank-bg-blackOPA__0_6 ank-color-white ank-fs-12px ank-borderRadius-6px ank-maxWidth-360px ank-maxHeight-40vh ank-overflow-auto ank-zIndex-1200"
>
  <div class="ank-fontWeight-600 ank-mb-0_25rem">Analytics (latest)</div>
  <ul class="ank-m-0 ank-pl-1rem">
    @for (e of recentEvents(); track $index) {
    <li>{{ e }}</li>
    }
  </ul>
</div>
}
