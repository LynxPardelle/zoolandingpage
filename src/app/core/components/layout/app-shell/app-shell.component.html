<wrapper-orchestrator [componentsIds]="['skipToMainLink']"></wrapper-orchestrator>
<!-- <div class="accContainer ank-d-none"></div> -->
<wrapper-orchestrator [componentsIds]="['siteHeader']"></wrapper-orchestrator>
<main id="main-content" class="ank-outline-none" #main role="main" tabindex="-1">
  <wrapper-orchestrator [componentsIds]="['landingPage']"></wrapper-orchestrator>
</main>
@defer {
<wrapper-orchestrator [componentsIds]="['siteFooter']"></wrapper-orchestrator>
<!-- Toast host analytics forwarding -->
<generic-toast-host (analyticsEvent)="handleAnalyticsEvent($event)"></generic-toast-host>
} @placeholder {
<footer id="contact-section" class="ank-bg-secondaryBgColor ank-color-secondaryTextColor ank-py-24px ank-px-16px">
  <div class="ank-container ank-maxWidth-7xl ank-marginInline-auto ank-display-flex ank-jc-center ank-gap-16px">
    <div class="ank-width-160px ank-height-12px ank-bg-bgColor ank-opacity-40 ank-borderRadius-8px"></div>
    <div class="ank-width-200px ank-height-12px ank-bg-bgColor ank-opacity-30 ank-borderRadius-8px"></div>
  </div>
</footer>
} @loading {
<footer id="contact-section" class="ank-bg-secondaryBgColor ank-py-24px ank-px-16px">
  <div class="ank-container ank-maxWidth-7xl ank-marginInline-auto ank-textAlign-center ank-color-secondaryTextColor">
    Cargando pie de página…
  </div>
</footer>
} @error {
<footer id="contact-section" class="ank-bg-secondaryBgColor ank-py-24px ank-px-16px">
  <div class="ank-container ank-maxWidth-7xl ank-marginInline-auto ank-textAlign-center ank-color-secondaryTextColor">
    No se pudo cargar el pie de página.
  </div>
</footer>
}

<!-- Advanced component hosts -->
<generic-modal-host [config]="(orchestrator.modalHostConfig$ | async) ?? orchestrator.fallbackModalHostConfig">
  <wrapper-orchestrator [componentsIds]="[]"></wrapper-orchestrator>
</generic-modal-host>
<generic-toast-host></generic-toast-host>

<!-- Dev-only demo controls -->
@if (debugMode) {
<wrapper-orchestrator [componentsIds]="orchestrator.devDemoControlsComponents"></wrapper-orchestrator>
} @if (debugMode) {
<div
  class="ank-position-md-fixed ank-bottom-6rem ank-right-25vw ank-mx-auto ank-p-0_5rem ank-bg-blackOPA__0_6 ank-color-white ank-fs-12px ank-borderRadius-6px ank-maxWidth-360px ank-maxHeight-40vh ank-overflow-auto ank-zIndex-1200"
>
  <div class="ank-fontWeight-600 ank-mb-0_25rem">Analytics (latest)</div>
  <ul class="ank-m-0 ank-pl-1rem">
    @for (e of recentEvents(); track $index) {
    <li>{{ e }}</li>
    }
  </ul>
</div>
}
