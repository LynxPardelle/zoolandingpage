<app-section variant="accent" spacing="lg">
  <app-container size="lg">
    <div class="ank-textAlign-center">
      <h2 class="ank-fs-2rem ank-fontWeight-bold ank-mb-16px ank-color-titleColor">
        {{ finalTitle() }}
      </h2>
      <p class="ank-fs-1_5rem ank-color-textColor ank-mb-32px ank-maxWidth-600px ank-mx-auto">
        {{ finalSubtitle() }}
      </p>
      <div
        class="ank-display-flex ank-flexDirection-column ank-flexDirection-sm-row ank-gap-16px ank-justifyContent-center ank-mb-32px ank-alignItems-stretch"
      >
        <generic-button
          [config]="{
            label: finalPrimaryLabel(),
            classes: 'btnBaseVALSVL1_5remVL1remVL btnTypePrimaryVALSVLsecondaryLinkColorVLtextColorVL'
          }"
          (pressed)="onPrimary()"
        />
        <generic-button
          [config]="{
            label: finalSecondaryLabel(),
            classes:
              'btnBaseVALSVL1_5remVL1remVL ank-bg-transparent ank-border-2px__solid__secondaryLinkColor ank-color-secondaryLinkColor ank-ts-200 ank-bgHover-secondaryLinkColor ank-colorHover-secondaryTextColor'
          }"
          (pressed)="onSecondary()"
        />
      </div>
      <div class="ank-display-flex ank-flexDirection-column ank-alignItems-center ank-gap-16px ank-opacity-70">
        <p class="ank-fs-1rem ank-color-textColor ank-m-0">
          {{ content().trustSignals.first }}
        </p>
        <div class="ank-display-flex ank-gap-16px ank-alignItems-center ank-fs-1rem ank-color-textColor">
          @for (signal of content().trustSignals.second; track signal) {
          <span>{{ signal }}</span>
          }
        </div>
      </div>
    </div>
  </app-container>
</app-section>
