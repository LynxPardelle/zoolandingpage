<app-section spacing="lg">
  <app-container size="xl">
    <div class="{{ titleClasses }}">
      <h2>{{ sectionTitle() }}</h2>
      <p>{{ sectionSubtitle() }}</p>
    </div>
    @defer (on viewport; prefetch on idle) {
    <div class="gridCol2">@for (t of testimonials(); track t.name) { <generic-testimonial-card [config]="t" /> }</div>
    } @placeholder {
    <div class="gridCol2">
      <!-- Testimonial Card Placeholder 1 -->
      <generic-testimonial-card
        [config]="{
          name: 'María González',
          role: 'CEO',
          company: 'TechStart',
          content: 'Increíble trabajo. Nuestras conversiones aumentaron un 300% en solo 2 meses.',
          rating: 5,
          avatar: '/assets/testimonials/placeholder-1.jpg'
        }"
      />
      <!-- Testimonial Card Placeholder 2 -->
      <generic-testimonial-card
        [config]="{
          name: 'Carlos Rodríguez',
          role: 'Director Marketing',
          company: 'Digital Pro',
          content: 'El mejor equipo con el que hemos trabajado. Resultados excepcionales.',
          rating: 5,
          avatar: '/assets/testimonials/placeholder-2.jpg'
        }"
      />
      <!-- Testimonial Card Placeholder 3 -->
      <generic-testimonial-card
        [config]="{
          name: 'Ana Martínez',
          role: 'Fundadora',
          company: 'E-commerce Plus',
          content: 'Conversión increíble. La inversión se pagó sola en el primer mes.',
          rating: 5,
          avatar: '/assets/testimonials/placeholder-3.jpg'
        }"
      />
      <!-- Testimonial Card Placeholder 4 -->
      <generic-testimonial-card
        [config]="{
          name: 'Roberto Silva',
          role: 'Gerente Ventas',
          company: 'SaaS Solutions',
          content: 'Landing page que realmente convierte. Altamente recomendado.',
          rating: 5,
          avatar: '/assets/testimonials/placeholder-4.jpg'
        }"
      />
    </div>
    }
  </app-container>
</app-section>
