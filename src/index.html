<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Landing Page Optimizada: Convierte visitas en clientes | ZoolandingPage</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Publica una landing rápida, clara y medible. Más cierres de venta, mejores decisiones con datos. Suscripción desde 900 MXN/mes (incluye dominio, alojamiento y medición)."
    />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/angora-styles.css" />
    <link rel="stylesheet" href="css/angora-styles-responsive.css" />
    <style>
      :root {
        --zlp-boot-bg: var(--ank-bgColor, #f8fafc);
        --zlp-boot-fg: var(--ank-textColor, #17202a);
        --zlp-boot-accent: var(--ank-accentColor, #0d9488);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --zlp-boot-bg: var(--ank-bgColor, #11161d);
          --zlp-boot-fg: var(--ank-textColor, #edf3f8);
          --zlp-boot-accent: var(--ank-accentColor, #25d366);
        }
      }

      :root[data-zlp-boot-theme="light"] {
        --zlp-boot-bg: var(--ank-bgColor, #f8fafc);
        --zlp-boot-fg: var(--ank-textColor, #17202a);
        --zlp-boot-accent: var(--ank-accentColor, #0d9488);
      }

      :root[data-zlp-boot-theme="dark"] {
        --zlp-boot-bg: var(--ank-bgColor, #11161d);
        --zlp-boot-fg: var(--ank-textColor, #edf3f8);
        --zlp-boot-accent: var(--ank-accentColor, #25d366);
      }

      .zlp-boot-curtain {
        position: fixed;
        inset: 0;
        z-index: 2147483000;
        display: grid;
        place-items: center;
        overflow: hidden;
        background: var(--zlp-boot-bg);
        color: var(--zlp-boot-fg);
        font-family: Arial, Helvetica, sans-serif;
      }

      .zlp-boot-curtain::before,
      .zlp-boot-curtain::after {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        width: calc(50% + 1px);
        background: var(--zlp-boot-bg);
        transition: transform 420ms cubic-bezier(0.77, 0, 0.175, 1);
      }

      .zlp-boot-curtain::before {
        left: 0;
      }

      .zlp-boot-curtain::after {
        right: 0;
      }

      .zlp-boot-curtain__content {
        position: relative;
        z-index: 1;
        display: grid;
        justify-items: center;
        gap: 0.85rem;
        width: min(22rem, calc(100vw - 2rem));
        text-align: center;
        transition: opacity 180ms ease, transform 180ms ease;
      }

      .zlp-boot-curtain__logo {
        width: 4.5rem;
        height: 4.5rem;
        object-fit: contain;
        border-radius: 0.75rem;
      }

      .zlp-boot-curtain__title {
        font-size: 1.15rem;
        line-height: 1.2;
      }

      .zlp-boot-curtain__subtitle {
        max-width: 18rem;
        font-size: 0.85rem;
        line-height: 1.45;
        opacity: 0.72;
      }

      .zlp-boot-curtain--leaving {
        pointer-events: none;
        background: transparent;
      }

      .zlp-boot-curtain--leaving::before {
        transform: translateX(-102%);
      }

      .zlp-boot-curtain--leaving::after {
        transform: translateX(102%);
      }

      .zlp-boot-curtain--leaving .zlp-boot-curtain__content {
        opacity: 0;
        transform: translateY(0.35rem);
      }

      @media (prefers-reduced-motion: reduce) {
        .zlp-boot-curtain,
        .zlp-boot-curtain::before,
        .zlp-boot-curtain::after,
        .zlp-boot-curtain__content {
          animation: none;
          transition: none;
        }
      }
    </style>
    <script>
      (function () {
        function token(value) {
          return String(value || "")
            .trim()
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, "-")
            .replace(/^-+|-+$/g, "");
        }

        function resolveTheme(value) {
          var theme = String(value || "").trim().toLowerCase();
          if (theme === "auto") {
            return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          return theme === "light" || theme === "dark" ? theme : "";
        }

        try {
          var params = new URLSearchParams(window.location.search || "");
          var isLocal = /^(localhost|127\.0\.0\.1|::1)$/i.test(window.location.hostname || "");
          var canUseDraftParam = isLocal || String(window.location.hostname || "").toLowerCase() === "test.zoolandingpage.com.mx";
          var draftDomain = params.get("draftDomain");
          var namespace = token(draftDomain && canUseDraftParam ? draftDomain : window.location.hostname) || "app";
          var theme = resolveTheme(window.localStorage.getItem(namespace + ":theme"));

          if (!theme && window.localStorage) {
            for (var i = 0; i < window.localStorage.length; i += 1) {
              var key = window.localStorage.key(i) || "";
              if (key.indexOf(namespace + ":") === 0 && /theme$/i.test(key)) {
                theme = resolveTheme(window.localStorage.getItem(key));
                if (theme) break;
              }
            }
          }

          if (!theme) {
            theme = resolveTheme(window.localStorage.getItem("app:theme"));
          }

          if (theme) {
            document.documentElement.setAttribute("data-zlp-boot-theme", theme);
          }
        } catch {
          // Keep CSS media-query fallback when storage is unavailable.
        }
      })();
      window.__ZLP_BOOT_CURTAIN_STARTED_AT__ = performance.now();
    </script>
  </head>
  <body class="ank-pos-relative ank-bg-bgColor ank-color-textColor">
    <div id="zlp-boot-curtain" class="zlp-boot-curtain" role="status" aria-live="polite" aria-busy="true">
      <div class="zlp-boot-curtain__content">
        <img
          class="zlp-boot-curtain__logo"
          data-zlp-boot-logo
          src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw=="
          alt=""
          hidden
        />
        <strong class="zlp-boot-curtain__title" data-zlp-boot-title>Zoo Landing Page</strong>
        <span class="zlp-boot-curtain__subtitle" data-zlp-boot-subtitle>zoolandingpage.com.mx</span>
      </div>
    </div>
    <app-root></app-root>
  </body>
</html>
