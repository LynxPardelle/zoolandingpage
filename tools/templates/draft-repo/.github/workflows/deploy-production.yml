name: Deploy production draft

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify test-to-main merge
        if: github.event_name == 'push'
        shell: bash
        run: |
          git fetch origin test --depth=50
          if ! git rev-parse HEAD^2 >/dev/null 2>&1; then
            echo "production deploys require a merge commit from test into main."
            exit 1
          fi
          if ! git merge-base --is-ancestor HEAD^2 origin/test; then
            echo "production deploy source must be test."
            exit 1
          fi

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Deploy production draft
        run: node tools/deploy-draft.mjs --environment=production
        env:
          DRAFT_DOMAIN: ${{ vars.DRAFT_DOMAIN }}
          DRAFT_ROOT: ${{ vars.DRAFT_ROOT || '.' }}
          AUTHORING_ENDPOINT: ${{ vars.AUTHORING_ENDPOINT }}
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
